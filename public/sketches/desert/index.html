<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Generative Tucson Desert</title>
  <style>
    :root {
      --glass-tint: rgba(28, 21, 17, 0.32);
      --glass-tint-strong: rgba(28, 21, 17, 0.44);
      --glass-stroke: rgba(255, 247, 234, 0.16);
      --glass-stroke-strong: rgba(255, 247, 234, 0.28);
      --glass-highlight: rgba(255, 247, 234, 0.55);
      --text: #fff8ec;
      --text-muted: rgba(255, 247, 234, 0.62);
      --text-faint: rgba(255, 247, 234, 0.42);
      --accent-warm: #ffd28b;
      --accent-deep: #ef8f4e;
      --accent-cool: #b6d2ff;
    }

    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #c9b598; font-family: ui-sans-serif, system-ui, sans-serif; color: #2b2118; }
    #app { position: fixed; inset: 0; }
    canvas { display: block; }
    #ui-root { position: fixed; inset: 0; z-index: 20; pointer-events: none; }

    .glass-ui, .glass-ui * { box-sizing: border-box; }
    .glass-ui {
      color: var(--text);
      font-size: 13px;
      line-height: 1.5;
      letter-spacing: 0.005em;
      text-shadow: 0 1px 2px rgba(20, 12, 5, 0.45);
      font-feature-settings: "ss01", "tnum";
    }

    /* ---------- Glass panel base ---------- */
    .gui-glass {
      position: relative;
      pointer-events: auto;
      background: linear-gradient(135deg, rgba(255, 240, 215, 0.10), rgba(20, 12, 5, 0.18));
      backdrop-filter: blur(22px) saturate(170%);
      -webkit-backdrop-filter: blur(22px) saturate(170%);
      border: 1px solid var(--glass-stroke);
      border-radius: 16px;
      box-shadow:
        inset 0 1px 0 var(--glass-highlight),
        inset 0 -1px 0 rgba(0, 0, 0, 0.18),
        0 12px 40px -8px rgba(15, 8, 3, 0.45),
        0 2px 10px rgba(15, 8, 3, 0.22);
      isolation: isolate;
    }
    .gui-glass::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      background: radial-gradient(120% 80% at 30% 0%, rgba(255, 247, 234, 0.10), transparent 65%);
      z-index: -1;
    }

    /* ---------- Toolbars ---------- */
    .gui-toolbar {
      position: fixed;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .gui-toolbar-left  { top: 18px; left: 18px; align-items: flex-start; }
    .gui-toolbar-right { top: 18px; right: 18px; align-items: flex-end; }

    /* ---------- Pill (toolbar buttons) ---------- */
    .gui-pill {
      display: inline-flex;
      align-items: stretch;
      padding: 4px;
      border-radius: 999px;
      gap: 2px;
    }
    .gui-pill-divider {
      width: 1px;
      align-self: stretch;
      margin: 4px 0;
      background: var(--glass-stroke);
    }
    .gui-icon-button {
      appearance: none;
      border: 0;
      background: transparent;
      color: inherit;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 7px 13px;
      border-radius: 999px;
      font: inherit;
      font-weight: 650;
      letter-spacing: 0.02em;
      transition: background 160ms ease, color 160ms ease, transform 160ms ease;
    }
    .gui-icon-button:hover { background: rgba(255, 247, 234, 0.10); }
    .gui-icon-button:active { transform: translateY(0.5px); }
    .gui-icon-button.is-active {
      background: rgba(255, 237, 194, 0.20);
      color: #fffaee;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.18);
    }
    .gui-icon-button svg {
      flex: none;
      opacity: 0.85;
    }
    .gui-icon-button.is-active svg { opacity: 1; }

    /* ---------- Mode toggle (segmented) ---------- */
    .gui-toggle {
      appearance: none;
      border: 0;
      cursor: pointer;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
      padding: 4px;
      border-radius: 999px;
      background: transparent;
      color: inherit;
      font: inherit;
      font-size: 11.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      min-width: 168px;
    }
    .gui-toggle span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 999px;
      color: var(--text-muted);
      transition: background 180ms ease, color 180ms ease, box-shadow 180ms ease;
    }
    .gui-toggle span.is-active {
      color: #fffaee;
      background: rgba(255, 237, 194, 0.20);
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.20),
        0 6px 18px rgba(45, 30, 20, 0.20);
    }

    /* ---------- Floating panels (Help / About) ---------- */
    .gui-panel {
      max-width: min(360px, calc(100vw - 36px));
      padding: 16px 18px 14px;
      border-radius: 18px;
      animation: gui-panel-in 240ms cubic-bezier(0.2, 0.7, 0.2, 1) both;
    }
    @keyframes gui-panel-in {
      from { opacity: 0; transform: translateY(-4px) scale(0.985); }
      to   { opacity: 1; transform: none; }
    }
    .gui-panel-eyebrow {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent-warm);
      margin-bottom: 4px;
    }
    .gui-panel-title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.005em;
      color: var(--text);
      margin: 0 0 10px;
    }
    .gui-panel-rule {
      height: 1px;
      background: linear-gradient(90deg, var(--glass-stroke-strong), transparent);
      margin: 10px 0;
    }
    .gui-panel-body { color: var(--text-muted); font-size: 12.5px; line-height: 1.55; }
    .gui-panel-body strong { color: var(--text); font-weight: 650; }
    .gui-panel-body p { margin: 0 0 8px; }
    .gui-panel-body p:last-child { margin-bottom: 0; }
    .gui-panel-foot {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--glass-stroke);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      color: var(--text-faint);
      font-size: 11px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .gui-panel-foot a {
      color: var(--accent-warm);
      text-decoration: none;
      font-weight: 700;
    }
    .gui-panel-foot a:hover { color: #fff; }

    .gui-memorial {
      margin: 4px 0 10px !important;
      padding: 10px 12px;
      border-left: 2px solid var(--accent-warm);
      background: rgba(255, 247, 234, 0.05);
      border-radius: 0 8px 8px 0;
      color: var(--text);
      font-size: 13px;
      letter-spacing: 0.01em;
    }
    .gui-memorial strong { font-weight: 700; }
    .gui-memorial-dates {
      display: inline-block;
      margin-top: 2px;
      font-size: 11px;
      letter-spacing: 0.10em;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }

    /* ---------- Help: keybind list ---------- */
    .gui-keys {
      display: grid;
      grid-template-columns: 1fr auto;
      row-gap: 9px;
      column-gap: 18px;
      align-items: center;
    }
    .gui-keys-label {
      font-size: 12.5px;
      color: var(--text-muted);
    }
    .gui-keys-row {
      display: inline-flex;
      gap: 4px;
      align-items: center;
      justify-content: flex-end;
    }
    .gui-key {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 22px;
      height: 22px;
      padding: 0 7px;
      border-radius: 6px;
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #fffaee;
      background: rgba(255, 247, 234, 0.10);
      border: 1px solid var(--glass-stroke-strong);
      box-shadow: inset 0 -1px 0 rgba(0, 0, 0, 0.22), inset 0 1px 0 rgba(255, 255, 255, 0.16);
      text-shadow: none;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .gui-key-sep {
      color: var(--text-faint);
      font-size: 11px;
      padding: 0 1px;
    }

    /* ---------- Simple controls panel ---------- */
    .gui-controls {
      width: min(308px, calc(100vw - 36px));
      padding: 14px 16px 16px;
      border-radius: 18px;
    }
    .gui-controls-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 12px;
    }
    .gui-controls-eyebrow {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-faint);
    }
    .gui-controls-location {
      font-size: 10.5px;
      letter-spacing: 0.05em;
      color: var(--text-faint);
      font-feature-settings: "tnum";
    }

    .gui-slider { display: grid; gap: 8px; margin: 0; }
    .gui-slider + .gui-slider { margin-top: 14px; }
    .gui-slider-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .gui-slider-head .gui-slider-label {
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }
    .gui-slider-head .gui-slider-label svg { opacity: 0.80; }
    .gui-slider-head .gui-slider-value {
      color: var(--accent-warm);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      font-variant-numeric: tabular-nums;
      text-transform: none;
    }
    .gui-slider-meta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    /* ---------- Media controls ---------- */
    .gui-media-row {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 12px;
      padding: 0 4px;
    }
    .gui-media-button {
      appearance: none;
      border: 0;
      cursor: pointer;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      background: rgba(255, 247, 234, 0.08);
      box-shadow:
        inset 0 0 0 1px var(--glass-stroke-strong),
        inset 0 1px 0 rgba(255, 255, 255, 0.16);
      transition: background 160ms ease, color 160ms ease, transform 140ms ease, box-shadow 180ms ease;
      padding: 0;
      text-shadow: none;
    }
    .gui-media-button svg { filter: drop-shadow(0 1px 1px rgba(15, 8, 3, 0.4)); }
    .gui-media-button:hover {
      background: rgba(255, 237, 194, 0.18);
      color: #fffaee;
    }
    .gui-media-button:active { transform: scale(0.94); }
    .gui-media-button:focus-visible {
      outline: 2px solid rgba(255, 239, 197, 0.85);
      outline-offset: 3px;
    }
    .gui-media-play { width: 32px; height: 32px; }
    .gui-media-play svg { transform: translateX(0.5px); }
    .gui-media-play.is-playing {
      color: #1a120a;
      background: linear-gradient(180deg, #ffe1a8, #ef8f4e);
      box-shadow:
        0 0 14px rgba(239, 143, 78, 0.45),
        inset 0 0 0 1px rgba(255, 255, 255, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.55);
    }
    .gui-media-play.is-playing svg { transform: none; filter: none; }

    .gui-rate-badge {
      position: absolute;
      right: 0;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--text-faint);
      font-variant-numeric: tabular-nums;
      transition: color 180ms ease;
      text-shadow: none;
    }
    .gui-rate-badge.is-active { color: var(--accent-warm); }

    /* ---------- "Now" reset button ---------- */
    .gui-controls-reset {
      appearance: none;
      border: 0;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 9px;
      border-radius: 999px;
      font: inherit;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      background: rgba(255, 247, 234, 0.06);
      box-shadow: inset 0 0 0 1px var(--glass-stroke);
      transition: color 160ms ease, background 160ms ease, transform 140ms ease;
    }
    .gui-controls-reset:hover {
      color: #fffaee;
      background: rgba(255, 237, 194, 0.18);
    }
    .gui-controls-reset:active { transform: scale(0.96); }
    .gui-controls-reset:focus-visible {
      outline: 2px solid rgba(255, 239, 197, 0.85);
      outline-offset: 3px;
    }

    .gui-slider-track {
      position: relative;
      height: 22px;
      display: flex;
      align-items: center;
    }
    .gui-slider-track input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 22px;
      margin: 0;
      background: transparent;
      cursor: pointer;
    }
    .gui-slider-track input[type="range"]:focus { outline: none; }
    .gui-slider-track::before {
      content: '';
      position: absolute;
      left: 0; right: 0;
      height: 6px;
      border-radius: 999px;
      background: rgba(20, 12, 5, 0.34);
      box-shadow:
        inset 0 1px 2px rgba(0, 0, 0, 0.32),
        inset 0 0 0 1px rgba(255, 247, 234, 0.06);
      pointer-events: none;
    }
    .gui-slider-track::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      height: 6px;
      border-radius: 999px;
      pointer-events: none;
      opacity: 0.78;
      mix-blend-mode: screen;
    }
    .gui-slider-day::after {
      background: linear-gradient(90deg,
        #1a1d3a 0%,
        #2c2860 14%,
        #5b3870 22%,
        #d97a64 30%,
        #f4a35a 38%,
        #ffd28b 48%,
        #c9d9ff 50%,
        #ffd28b 58%,
        #f4a35a 66%,
        #d97a64 74%,
        #5b3870 82%,
        #2c2860 90%,
        #1a1d3a 100%
      );
    }
    .gui-slider-year::after {
      background: linear-gradient(90deg,
        #8eaad8 0%,
        #b9c8a4 24%,
        #efc066 50%,
        #d28a4a 74%,
        #8eaad8 100%
      );
    }
    .gui-slider-track input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #fff8e9, #f7e2ad 70%, #c69553);
      border: 1px solid rgba(255, 255, 255, 0.7);
      box-shadow:
        0 0 14px rgba(255, 210, 139, 0.55),
        0 1px 3px rgba(15, 8, 3, 0.55),
        inset 0 1px 0 rgba(255, 255, 255, 0.9);
      cursor: grab;
      transition: transform 140ms ease, box-shadow 180ms ease;
    }
    .gui-slider-track input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.08); }
    .gui-slider-track input[type="range"]:active::-webkit-slider-thumb {
      cursor: grabbing;
      transform: scale(1.12);
      box-shadow:
        0 0 18px rgba(255, 210, 139, 0.85),
        0 1px 4px rgba(15, 8, 3, 0.6),
        inset 0 1px 0 rgba(255, 255, 255, 0.95);
    }
    .gui-slider-track input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #fff8e9, #f7e2ad 70%, #c69553);
      border: 1px solid rgba(255, 255, 255, 0.7);
      box-shadow:
        0 0 14px rgba(255, 210, 139, 0.55),
        0 1px 3px rgba(15, 8, 3, 0.55);
      cursor: grab;
    }
    .gui-slider-track input[type="range"]:focus-visible::-webkit-slider-thumb {
      box-shadow:
        0 0 0 3px rgba(255, 247, 234, 0.4),
        0 0 16px rgba(255, 210, 139, 0.7);
    }

    /* ---------- Progress ---------- */
    .gui-progress {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 16px 12px;
      border-radius: 14px;
      width: min(360px, calc(100vw - 24px));
    }
    .gui-progress-label {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      white-space: nowrap;
    }
    .gui-progress-label span {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .gui-progress-label span:first-child { min-width: 0; }
    .gui-progress-label span:last-child {
      color: var(--accent-warm);
      font-variant-numeric: tabular-nums;
      flex: none;
    }
    .gui-progress-track {
      height: 5px;
      border-radius: 999px;
      background: rgba(20, 12, 5, 0.38);
      overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(255, 247, 234, 0.08);
    }
    .gui-progress-bar {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #ffe1a8, #ef8f4e 55%, #b6d2ff);
      box-shadow: 0 0 14px rgba(239, 143, 78, 0.5);
      transition: width 0.18s ease;
    }

    /* ---------- Focus visibility ---------- */
    .gui-icon-button:focus-visible,
    .gui-toggle:focus-visible,
    .gui-panel-foot a:focus-visible {
      outline: 2px solid rgba(255, 239, 197, 0.85);
      outline-offset: 3px;
    }

    /* ---------- Responsive ---------- */
    @media (max-width: 560px) {
      .gui-toolbar-left, .gui-toolbar-right { top: 14px; }
      .gui-toolbar-left { left: 12px; }
      .gui-toolbar-right { right: 12px; }
      .gui-panel { max-width: calc(100vw - 24px); }
      .gui-controls { width: calc(100vw - 24px); }
      .gui-toggle { min-width: 0; }
      .gui-toggle span { padding: 7px 10px; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="ui-root"></div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
      "lil-gui": "https://unpkg.com/lil-gui@0.19.2/dist/lil-gui.esm.js",
      "react": "https://esm.sh/react@18.2.0",
      "react-dom": "https://esm.sh/react-dom@18.2.0",
      "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
      "simplex-noise": "https://esm.sh/simplex-noise@4.0.1"
    }
  }
  </script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
