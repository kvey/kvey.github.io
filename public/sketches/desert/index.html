<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Generative Tucson Desert</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #c9b598; font-family: ui-sans-serif, system-ui, sans-serif; color: #2b2118; }
    #app { position: fixed; inset: 0; }
    canvas { display: block; }
    #ui-root { position: fixed; inset: 0; z-index: 20; pointer-events: none; }
    .glass-ui, .glass-ui * { box-sizing: border-box; }
    .glass-ui { color: #f8efe2; font-size: 13px; line-height: 1.35; text-shadow: 0 1px 2px rgba(37, 24, 17, 0.35); }
    .glass-ui-button, .glass-ui-hint, .glass-ui-progress { pointer-events: auto; }
    .glass-ui-button {
      border: 0; background: transparent; color: inherit; cursor: pointer;
      display: inline-flex; align-items: center; gap: 8px; font: inherit; font-weight: 700;
      min-height: 34px; white-space: nowrap;
    }
    .glass-ui-button:focus-visible {
      outline: 2px solid rgba(255, 239, 197, 0.9); outline-offset: 3px;
    }
    .glass-ui-progress { width: min(360px, calc(100vw - 24px)); }
    .glass-ui-progress-label {
      display: flex; justify-content: space-between; gap: 12px; margin-bottom: 7px;
      color: rgba(255, 247, 234, 0.86); font-size: 11px; font-weight: 800; text-transform: uppercase;
    }
    .glass-ui-progress-track {
      height: 6px; border-radius: 999px; background: rgba(25, 19, 15, 0.32); overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.14);
    }
    .glass-ui-progress-bar {
      height: 100%; border-radius: inherit;
      background: linear-gradient(90deg, #ffe1a8, #ef8f4e, #b6d2ff);
      box-shadow: 0 0 16px rgba(239, 143, 78, 0.46);
      transition: width 0.18s ease;
    }
    .glass-ui-hint { max-width: min(360px, calc(100vw - 24px)); color: rgba(255, 247, 234, 0.84); }
    .glass-ui-hint b { color: #fff4c8; font-weight: 800; }
    @media (max-width: 560px) {
      .glass-ui-hint { display: none; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="ui-root"></div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
      "lil-gui": "https://unpkg.com/lil-gui@0.19.2/dist/lil-gui.esm.js",
      "react": "https://esm.sh/react@18.2.0",
      "react-dom": "https://esm.sh/react-dom@18.2.0",
      "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
      "liquid-glass-react": "https://esm.sh/liquid-glass-react@1.1.1?deps=react@18.2.0,react-dom@18.2.0",
      "simplex-noise": "https://esm.sh/simplex-noise@4.0.1"
    }
  }
  </script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
